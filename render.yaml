services:
  # Backend - Node.js web service
  - type: web
    name: zcoer-internship-backend
    env: docker
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: CLIENT_URL
        value: https://zcoer-internship-frontend.onrender.com
      # Ensure you manually add MONGO_URI, JWT_SECRET, and CLOUDINARY keys in Render Dashboard
    rootDir: backend
    dockerfilePath: backend/Dockerfile

  # Frontend - Docker Web Service
  - type: web
    name: zcoer-internship-frontend
    env: docker
    envVars:
      - key: VITE_API_URL
        value: https://zcoer-internship-backend.onrender.com/api
    rootDir: frontend
    dockerfilePath: frontend/Dockerfile